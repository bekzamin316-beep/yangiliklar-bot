version: '3.8'

services:
  bot:
    build: .
    container_name: crypto_news_bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/crypto_news_bot
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - crypto_bot_network
    volumes:
      - ./logs:/app/logs

  db:
    image: postgres:15-alpine
    container_name: crypto_news_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: crypto_news_bot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - crypto_bot_network

  redis:
    image: redis:7-alpine
    container_name: crypto_news_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - crypto_bot_network

networks:
  crypto_bot_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
